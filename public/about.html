<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>About Us — Brothers' Tutorial</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{primary:'#1e3a5f','primary-light':'#2a5080',accent:'#f59e0b'}}}}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap');
body{font-family:'Inter','Noto Sans Bengali',sans-serif}
.bn{font-family:'Noto Sans Bengali','Inter',sans-serif}
</style>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Navigation -->
<nav class="bg-primary text-white sticky top-0 z-40 shadow-lg">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-lg bg-accent flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#1e3a5f" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342"/></svg>
      </div>
      <div class="leading-tight">
        <div class="font-bold text-sm">Brothers' Tutorial</div>
        <div class="text-[10px] text-white/50 bn">ব্রাদার্স টিউটোরিয়াল</div>
      </div>
    </a>
    <div class="hidden md:flex items-center gap-6 text-sm font-medium">
      <a href="/" class="hover:text-accent transition">Home</a>
      <a href="/about.html" class="text-accent">About</a>
      <a href="/admission-details.html" class="hover:text-accent transition">Admission</a>
    </div>
    <button id="mobMenuBtn" class="md:hidden p-1">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
    </button>
  </div>
  <div id="mobMenu" class="hidden md:hidden border-t border-white/10 px-4 pb-3 pt-2 space-y-1 text-sm font-medium">
    <a href="/" class="block py-2 hover:text-accent transition">Home</a>
    <a href="/about.html" class="block py-2 text-accent">About</a>
    <a href="/admission-details.html" class="block py-2 hover:text-accent transition">Admission</a>
  </div>
</nav>

<!-- Page Header -->
<section class="bg-primary text-white py-16">
  <div class="max-w-4xl mx-auto px-4 text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold" id="pageTitle">About Brothers' Tutorial</h1>
    <p class="bn text-xl text-accent font-semibold mt-2" id="pageTitleBn">ব্রাদার্স টিউটোরিয়াল সম্পর্কে</p>
  </div>
</section>

<!-- Content -->
<section class="py-12 md:py-16">
  <div class="max-w-4xl mx-auto px-4" id="aboutContent">
    <div class="animate-pulse space-y-4">
      <div class="h-4 bg-slate-200 rounded w-3/4"></div>
      <div class="h-4 bg-slate-200 rounded w-full"></div>
      <div class="h-4 bg-slate-200 rounded w-5/6"></div>
    </div>
  </div>
</section>

<!-- Mission & Vision -->
<section class="py-12 bg-white" id="missionVision" style="display:none">
  <div class="max-w-4xl mx-auto px-4 grid md:grid-cols-2 gap-8">
    <div class="bg-gradient-to-br from-primary to-primary-light rounded-2xl p-8 text-white">
      <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 0 1-2.448-2.448 14.9 14.9 0 0 1 .06-.312m-2.24 2.39a4.493 4.493 0 0 0-1.757 4.306 4.493 4.493 0 0 0 4.306-1.758M16.5 9a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/></svg>
      </div>
      <h3 class="text-xl font-bold mb-3">Our Mission</h3>
      <p class="bn text-accent font-medium mb-2">আমাদের লক্ষ্য</p>
      <p class="text-white/80 leading-relaxed" id="missionEn"></p>
      <p class="bn text-white/60 text-sm mt-2 leading-relaxed" id="missionBn"></p>
    </div>
    <div class="bg-gradient-to-br from-accent to-amber-600 rounded-2xl p-8 text-white">
      <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
      </div>
      <h3 class="text-xl font-bold mb-3">Our Vision</h3>
      <p class="bn text-primary font-medium mb-2">আমাদের দৃষ্টিভঙ্গি</p>
      <p class="text-white/90 leading-relaxed" id="visionEn"></p>
      <p class="bn text-white/70 text-sm mt-2 leading-relaxed" id="visionBn"></p>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-primary text-white py-8">
  <div class="max-w-6xl mx-auto px-4 text-center text-sm text-white/50">
    &copy; 2024 Brothers' Tutorial, Baruipara, Nadia. All rights reserved.
  </div>
</footer>

<script>
document.getElementById('mobMenuBtn').addEventListener('click', () => document.getElementById('mobMenu').classList.toggle('hidden'))

async function init() {
  try {
    const r = await fetch('/api/content')
    const d = await r.json()
    const a = d.about

    document.getElementById('pageTitle').textContent = a.titleEn
    document.getElementById('pageTitleBn').textContent = a.titleBn

    document.getElementById('aboutContent').innerHTML =
      '<div class="prose max-w-none"><p class="text-lg leading-relaxed text-slate-700 whitespace-pre-line">' + (a.descriptionEn || '') + '</p><p class="bn text-base leading-relaxed text-slate-500 mt-4 whitespace-pre-line">' + (a.descriptionBn || '') + '</p></div>'

    document.getElementById('missionEn').textContent = a.missionEn || ''
    document.getElementById('missionBn').textContent = a.missionBn || ''
    document.getElementById('visionEn').textContent = a.visionEn || ''
    document.getElementById('visionBn').textContent = a.visionBn || ''
    document.getElementById('missionVision').style.display = ''
  } catch (e) {
    document.getElementById('aboutContent').innerHTML = '<p class="text-red-500">Failed to load content.</p>'
  }
}
init()
</script>
</body>
</html>
